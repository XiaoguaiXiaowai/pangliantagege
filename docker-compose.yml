version: '3.8'

services:
  # ----------------------------------------------------
  # 核心服务：我们的 RAG API
  # ----------------------------------------------------
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      # 注意：由于我们在 docker 容器里，而 ollama 跑在宿主机
      # 在 Mac 上，用 host.docker.internal 访问宿主机的 ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_CHAT_MODEL=llama3.2:3b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    volumes:
      # 挂载数据目录，让 Chroma 向量库和上传的文件在容器重启后不丢失
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - prometheus

  # ----------------------------------------------------
  # 监控组件：Prometheus (负责抓取 API 的 /metrics)
  # ----------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: rag_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ----------------------------------------------------
  # 监控面板：Grafana (负责展示 Prometheus 的数据)
  # ----------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: rag_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
