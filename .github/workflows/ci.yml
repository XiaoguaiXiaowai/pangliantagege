name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          
      - name: Lint with Ruff
        run: |
          ruff check .
          
      - name: Type check with mypy
        run: |
          mypy app/
          
      - name: Run tests
        run: |
          # 运行 pytest（由于目前还没写复杂单测，只确保它能跑通）
          pytest tests/

  build-and-push:
    needs: test-and-lint
    # 只有在推送到 main 分支时才构建镜像
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # 这里配置为 false，因为这只是一个本地项目示例，不真实推送到 Docker Hub
          tags: local-rag-assistant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
